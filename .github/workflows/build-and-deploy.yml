name: CI / Release / Deploy

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    ci:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npm run prettier:check
            - run: npm audit --audit-level=high
            - run: npm run build

    release:
        name: Release
        runs-on: ubuntu-latest
        needs: ci
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
            - run: npm ci
            - run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: release
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main
            - run: git pull origin main
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
            - run: npm ci
            - run: npm run build
            - run: npm i -g vercel
            - run: vercel deploy --prod --token $VERCEL_TOKEN
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
